<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>くらしリレー アイコン — おやこしずく（きらきら）</title>
<style>
  :root{--bg:#fff6f9;--panel:#ffffff;--line:#f2dce6;--ink:#4a3743;--muted:#9a8390;--accent:#e85e97;--shadow:0 12px 34px rgba(232,94,151,.16);--radius:24px;--font:"Hiragino Maru Gothic ProN","Zen Maru Gothic","BIZ UDPGothic","Rounded Mgen+ 1c","Meiryo",system-ui,sans-serif;}
  @media (prefers-color-scheme:dark){:root{--bg:#171219;--panel:#211a22;--line:#372934;--ink:#f4e7ef;--muted:#b79fac;--accent:#ff9ec8;--shadow:0 16px 44px rgba(0,0,0,.5);}}
  :root[data-theme="dark"]{--bg:#171219;--panel:#211a22;--line:#372934;--ink:#f4e7ef;--muted:#b79fac;--accent:#ff9ec8;--shadow:0 16px 44px rgba(0,0,0,.5);}
  :root[data-theme="light"]{--bg:#fff6f9;--panel:#ffffff;--line:#f2dce6;--ink:#4a3743;--muted:#9a8390;--accent:#e85e97;--shadow:0 12px 34px rgba(232,94,151,.16);}
  *{box-sizing:border-box}body{margin:0}
  .wrap{font-family:var(--font);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6;padding:clamp(20px,5vw,56px) clamp(16px,4vw,40px) 72px}
  .inner{max-width:960px;margin:0 auto}
  .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 6px}
  h1{font-size:clamp(24px,5vw,38px);margin:0 0 8px;text-wrap:balance}
  .lead{color:var(--muted);font-size:clamp(14px,2.4vw,16px);max-width:58ch;margin:0}
  h2{font-size:clamp(17px,3vw,22px);margin:clamp(34px,6vw,56px) 0 18px}
  .hero{display:flex;justify-content:center;margin-top:26px}
  .hero svg{width:clamp(220px,52vw,300px);border-radius:24%;box-shadow:0 18px 40px rgba(232,94,151,.28)}
  .themes{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(10px,2vw,18px)}
  @media(max-width:640px){.themes{grid-template-columns:repeat(3,1fr)}}
  .swatch{text-align:center}
  .swatch svg{width:100%;max-width:160px;border-radius:24%;box-shadow:0 8px 20px rgba(0,0,0,.14)}
  .swatch .name{margin-top:9px;font-weight:700;font-size:14px}
  .swatch .name small{display:block;color:var(--muted);font-weight:400;font-size:11.5px}
  .sizes{display:flex;flex-wrap:wrap;gap:clamp(16px,3vw,30px);align-items:flex-end;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;box-shadow:var(--shadow)}
  .sz{display:flex;flex-direction:column;align-items:center;gap:8px}
  .sz svg{border-radius:24%;box-shadow:0 4px 10px rgba(0,0,0,.18)}
  .sz b{font-size:12px;color:var(--muted)}
  footer{margin-top:56px;text-align:center;color:var(--muted);font-size:12.5px}
</style></head>
